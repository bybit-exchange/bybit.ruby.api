name: Publish to rubygems

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    # id-token: write is required for rubygems.org OIDC Trusted Publishing.
    # The rubygems/release-gem action exchanges GitHub's OIDC token for a
    # short-lived rubygems.org API key — no long-lived RUBYGEMS_API_KEY
    # secret is needed. Trusted publisher config on rubygems.org must match
    # (repo, workflow filename, environment).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Match .ruby-version. Ruby 3.2 ships bundler 2.4.19 + stdlib uri
          # 0.12.5, which conflicts with the uri >= 1.x that `bundle install`
          # resolves for our faraday dep — bundler activates the stdlib uri
          # first and then errors on the Gemfile requirement. 3.3.5 ships
          # bundler 2.5.x which handles the default-gem overlap correctly.
          ruby-version: '3.3.5'
          bundler-cache: true

      - name: Validate tag is on main branch
        run: |
          git fetch origin main --depth=50
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "Error: tag '$GITHUB_REF_NAME' is not reachable from origin/main"
            exit 1
          fi
          echo "Branch check passed: tag is on main"

      - name: Validate tag matches lib/bybit/version.rb VERSION
        run: |
          set -eu
          GEM_VERSION=$(bundle exec ruby -Ilib -rbybit/version -e 'print Bybit::VERSION')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$GEM_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: tag '$TAG_VERSION' does not match Bybit::VERSION '$GEM_VERSION'"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: RuboCop + RSpec must pass before publish
        run: |
          bundle exec rubocop --parallel
          bundle exec rspec

      # Trusted publishing via OIDC. rubygems/release-gem@v1:
      #   1. Requests an OIDC token from GitHub's provider (needs id-token: write above).
      #   2. Exchanges it with rubygems.org for a short-lived API key.
      #   3. Runs gem build + gem push using that key.
      # No long-lived RUBYGEMS_API_KEY secret required.
      - name: Release gem (OIDC trusted publishing)
        uses: rubygems/release-gem@v1
